apiVersion: v1
kind: Service
metadata:
  name: ollama
  labels:
    {{- include "transactiq.labels" . | nindent 4 }}
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels:
    app: ollama
    {{- include "transactiq.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: {{ .Values.ollama.image }}
          ports:
            - containerPort: 11434
          readinessProbe:
            exec:
              command: ["sh", "-c", "ollama --version"]
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
      volumes:
        # Model is pulled on demand into this volume:
        #   kubectl exec deploy/ollama -- ollama pull {{ .Values.ollama.model }}
        - name: models
          emptyDir: {}
