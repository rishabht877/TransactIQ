apiVersion: v1
kind: Service
metadata:
  name: payment-gateway
  labels:
    {{- include "transactiq.labels" . | nindent 4 }}
spec:
  selector:
    app: payment-gateway
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway
  labels:
    app: payment-gateway
    {{- include "transactiq.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app: payment-gateway
  template:
    metadata:
      labels:
        app: payment-gateway
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z mysql 3306 && nc -z redis 6379 && nc -z kafka 9092; do echo waiting; sleep 2; done"]
      containers:
        - name: payment-gateway
          image: {{ .Values.images.gateway }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/{{ .Values.mysql.database }}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
            - { name: MYSQL_USER, value: {{ .Values.mysql.user | quote }} }
            - { name: MYSQL_PASSWORD, value: {{ .Values.mysql.password | quote }} }
            - { name: KAFKA_BOOTSTRAP_SERVERS, value: "kafka:9092" }
            - { name: REDIS_HOST, value: "redis" }
            - { name: REDIS_PORT, value: "6379" }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 15
