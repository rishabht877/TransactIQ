apiVersion: v1
kind: Service
metadata:
  name: payment-processor
  labels:
    {{- include "transactiq.labels" . | nindent 4 }}
spec:
  selector:
    app: payment-processor
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-processor
  labels:
    app: payment-processor
    {{- include "transactiq.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.processor.replicas }}
  selector:
    matchLabels:
      app: payment-processor
  template:
    metadata:
      labels:
        app: payment-processor
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z mysql 3306 && nc -z kafka 9092 && nc -z fraud-service 8082; do echo waiting; sleep 2; done"]
      containers:
        - name: payment-processor
          image: {{ .Values.images.processor }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/{{ .Values.mysql.database }}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
            - { name: MYSQL_USER, value: {{ .Values.mysql.user | quote }} }
            - { name: MYSQL_PASSWORD, value: {{ .Values.mysql.password | quote }} }
            - { name: KAFKA_BOOTSTRAP_SERVERS, value: "kafka:9092" }
            - { name: FRAUD_SERVICE_URL, value: "http://fraud-service:8082" }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8081 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8081 }
            initialDelaySeconds: 30
            periodSeconds: 15
